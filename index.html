<html lang="en">

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Finalytics — Interactive Sandbox (Business Owner)</title>

<!-- Favicons / PWA icons (real Finalytics brand assets) -->
<link rel="icon" href="favicon.ico" sizes="32x32" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="manifest" href="manifest.webmanifest" />

<!--
  ============================================================================
  FINALYTICS — INTERACTIVE HTML SANDBOX PROTOTYPE  (Business Owner mode)
  ----------------------------------------------------------------------------
  This is a DEMO / sandbox. All data is mock. No backend, no Firebase.
  Built to mirror the real React app's look & every owner-facing action so a
  client can click around and "feel" the product. Single self-contained file.
  Just open it in a browser. (CDNs load Tailwind / Lucide icons / ApexCharts.)
  ============================================================================
-->

<!-- Tailwind (Play CDN) so the exact utility classes from the real app render -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'] },
      }
    }
  }
</script>

<!-- Inter font + icons + charts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<style>
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; }
  /* The real app uses body { zoom: 80% } */
  #app-zoom { zoom: 0.9; }

  .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 4px; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

  /* Animations copied from the real index.css */
  .fade-in-content { animation: fadeInContent .5s ease-out forwards; }
  @keyframes fadeInContent { from { opacity: 0; transform: translateY(4px);} to { opacity:1; transform: translateY(0);} }
  .animate-slide-up { animation: slideUp .3s ease-out forwards; }
  @keyframes slideUp { from { opacity:0; transform: translateY(20px);} to { opacity:1; transform: translateY(0);} }
  .animate-page-enter { animation: pageEnter .5s ease-in-out forwards; }
  @keyframes pageEnter { from { opacity: 0; } to { opacity: 1; } }

  /* Hint dots — pulsing indigo marker on key actions */
  .hint-dot { position:absolute; top:-5px; right:-5px; width:12px; height:12px; pointer-events:none; z-index:5; }
  .hint-dot::before { content:''; position:absolute; inset:0; border-radius:9999px; background:#6366f1; opacity:.75; animation: hintping 1.4s cubic-bezier(0,0,.2,1) infinite; }
  .hint-dot::after  { content:''; position:absolute; inset:2px; border-radius:9999px; background:#4f46e5; }
  @keyframes hintping { 75%,100% { transform: scale(2.4); opacity:0; } }
  body.hints-off .hint-dot { display:none; }

  .modal-backdrop { background: rgba(17,24,39,.55); backdrop-filter: blur(2px); }
  [x-cloak] { display: none !important; }

  /* Wrapped — only the card animates on the static black backdrop */
  .wrapped-card { animation: wcardIn .5s cubic-bezier(.2,.7,.3,1) both; }
  @keyframes wcardIn { 0% { opacity:0; transform: translateY(28px) scale(.94); } 100% { opacity:1; transform: translateY(0) scale(1); } }
  .wnav { position:absolute; top:50%; transform:translateY(-50%); padding:.7rem; border-radius:9999px; color:#fff; background:rgba(255,255,255,.08); transition:background .2s; z-index:20; }
  .wnav:hover { background:rgba(255,255,255,.2); }
</style>
</head>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" value="owner@kopinusantara.id" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500" placeholder="name@company.com" />

          <span class="hint-dot"></span>

<!-- ============================ ONBOARDING ============================ -->
<div id="onboarding-screen" class="hidden min-h-screen items-center justify-center bg-gradient-to-br from-indigo-50 to-purple-50 px-4">
  <div class="w-full max-w-lg">
    <!-- Steps indicator -->
    <div class="flex items-center justify-center gap-4 mb-8">
      <div class="flex items-center gap-2">
        <div id="ob-step1-dot" class="w-9 h-9 rounded-full bg-indigo-600 text-white flex items-center justify-center"><i data-lucide="building-2" style="width:18px;height:18px"></i></div>
        <span class="font-semibold text-gray-700">Brand</span>
      </div>
      <i data-lucide="arrow-right" class="text-gray-300" style="width:20px;height:20px"></i>
      <div class="flex items-center gap-2">
        <div id="ob-step2-dot" class="w-9 h-9 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center"><i data-lucide="map-pin" style="width:18px;height:18px"></i></div>
        <span class="font-semibold text-gray-400" id="ob-step2-label">Branch</span>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
      <!-- Step 1 -->
      <div id="ob-step1">
        <h2 class="text-2xl font-bold text-gray-900">Create Your Brand</h2>
        <p class="text-gray-500 mt-1">What's your business called?</p>
        <div class="mt-6 space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Brand Name *</label>
            <input id="ob-brand-name" value="Kopi Nusantara" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500" placeholder="e.g. My Coffee Shop" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Description (optional)</label>
            <textarea rows="3" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500" placeholder="Brief description of your brand">Specialty coffee chain across Indonesia</textarea>
          </div>
          <button onclick="obNext()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors">Next: Add a Branch →</button>
        </div>
      </div>
      <!-- Step 2 -->
      <div id="ob-step2-form" class="hidden">
        <h2 class="text-2xl font-bold text-gray-900">Add Your First Branch</h2>
        <p class="text-gray-500 mt-1">Where is <span id="ob-brand-echo" class="font-semibold text-indigo-600">Kopi Nusantara</span> located?</p>
        <div class="mt-6 space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Branch Name *</label>
            <input id="ob-branch-name" value="Jakarta Pusat" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500" placeholder="e.g. Main Branch" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Address (optional)</label>
            <input value="Jl. M.H. Thamrin No.1, Jakarta" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500" placeholder="e.g. 123 Main Street" />
          </div>
          <button onclick="obComplete()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors">✓ Complete Setup</button>
        </div>
      </div>
    </div>
  </div>
</div>

function curve(base, points, jitter, peakIdx){
  // deterministic pseudo-data generator (no Math.random — stable across reloads)
  const out=[];
  for(let i=0;i<points;i++){
    const wave = Math.sin((i/points)*Math.PI*2)*0.18 + Math.sin((i/3))*0.06;
    const peak = peakIdx!=null ? Math.exp(-Math.pow(i-peakIdx,2)/ (points*0.6)) * 0.5 : 0;
    out.push(Math.round(base*(1+wave+peak) + (i%5)*jitter));
  }
  return out;
}

/* ============================================================================
   ROUTER
   ========================================================================== */
const SCREENS = {}; // id -> render fn, registered below
function route(){
  let id = (location.hash||'#/dashboard').replace('#/','');
  if(id==='wrapped'){ openWrapped(); history.replaceState(null,'', '#/'+ (window._lastScreen||'dashboard')); renderNav(); return; }
  window._lastScreen = id;
  const fn = SCREENS[id] || SCREENS['dashboard'];
  const el = document.getElementById('screen-content');
  el.innerHTML = `<div class="fade-in-content">${fn()}</div>`;
  icons();
  // Defer chart rendering until the CSS grid has placed cards in their columns,
  // otherwise ApexCharts measures full-row width and overflows into the next card.
  if(CHART_INIT[id]) requestAnimationFrame(()=>requestAnimationFrame(()=>{
    if(((location.hash||'#/dashboard').replace('#/','')) === id) CHART_INIT[id]();
  }));
  renderNav();
  syncBrandBranchLabels();
  document.querySelector('main').scrollTo(0,0);
}
window.addEventListener('hashchange', route);

// Re-render the current screen's charts on resize so widths stay correct.
let _resizeT;
window.addEventListener('resize', ()=>{
  clearTimeout(_resizeT);
  _resizeT = setTimeout(()=>{
    const id = (location.hash||'#/dashboard').replace('#/','');
    if(CHART_INIT[id] && !document.getElementById('app-zoom').classList.contains('hidden')) CHART_INIT[id]();
  }, 200);
});

const CHART_INIT = {};
</script>

function pnlSankey(p){
  // lightweight SVG flow approximation
  const bar = (label,val,color,w) => `<div class="flex items-center gap-3"><div class="w-40 shrink-0 text-sm text-gray-600 text-right">${label}</div>
    <div class="h-9 rounded-md ${color} flex items-center px-3 text-white text-sm font-semibold whitespace-nowrap" style="width:${Math.max(w,10)}%; min-width:120px">${fmtCompact(val)}</div></div>`;
  const r = p.revenue;
  return `<div class="space-y-3">
    ${bar('Revenue', r, 'bg-indigo-500', 100)}
    ${bar('– COGS', p.cogs, 'bg-orange-400', p.cogs/r*100)}
    ${bar('= Gross Profit', p.gross, 'bg-emerald-500', p.gross/r*100)}
    ${bar('– Operating Exp.', p.opex, 'bg-blue-400', p.opex/r*100)}
    ${bar('= Operating Profit', p.operating, 'bg-teal-500', Math.max(p.operating/r*100,8))}
    ${bar('– Other Exp.', p.other, 'bg-purple-400', p.other/r*100)}
    ${bar('= Net Profit', p.net, p.net>=0?'bg-green-600':'bg-red-500', Math.max(p.net/r*100,8))}
  </div>`;
}

SCREENS['investor-connect'] = function(){

  return `<div class="px-6 pt-6 pb-10 space-y-6">
    ${pageHeader('Investor Connect','Investor-ready business overview & downloadable summary.',
      `<div class="flex items-center gap-2">
        ${['Monthly','Quarterly','Yearly'].map(x=>`<button onclick="state.period='${x}';route()" class="px-3 py-1.5 rounded-lg text-sm font-medium ${state.period===x?'bg-indigo-600 text-white':'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'}">${x}</button>`).join('')}

      <div class="grid grid-cols-2 md:grid-cols-5 gap-4 text-sm">
        ${[['Sector',pr.sector],['Region',pr.region],['Business Size',pr.size],['Business Model',pr.model],['Target Market',pr.target]].map(([k,v])=>`<div><p class="text-indigo-300 text-xs">${k}</p><p class="font-semibold mt-0.5">${v}</p></div>`).join('')}

    </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-6">

      ${statCard({title:'Transactions',value:fmtNum(d.transactions),sub:'',icon:'activity',color:'text-blue-600 bg-blue-50',badge:growthBadge(growth(d.revenue/1e6))})}
      ${statCard({title:'Average Ticket',value:fmtIDR(d.avgTicket),sub:'',icon:'credit-card',color:'text-purple-600 bg-purple-50'})}
      ${statCard({title:'Net Profit Margin',value:p.netMargin.toFixed(1)+'%',sub:'',icon:'percent',color:'text-amber-600 bg-amber-50'})}

      <div class="bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl p-6 text-white"><p class="text-blue-100 text-sm">Operating Margin</p><p class="text-4xl font-black mt-2">${p.opMargin.toFixed(1)}%</p></div>
      <div class="bg-gradient-to-br from-purple-500 to-pink-600 rounded-xl p-6 text-white"><p class="text-purple-100 text-sm">Net Profit Margin</p><p class="text-4xl font-black mt-2">${p.netMargin.toFixed(1)}%</p></div>
    </div>

    ${card('Revenue Trend','Monthly revenue this period','<div id="chart-ic-trend" class="h-56"></div>','trending-up')}

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      ${card('P&L Summary','Period statement', `
        <table class="w-full text-sm">
          <tbody class="divide-y divide-gray-100">
            ${[['Revenue',p.revenue,false],['COGS',-p.cogs,false],['Gross Profit',p.gross,true],['Operating Expenses',-p.opex,false],['Operating Profit',p.operating,true],['Other Expenses',-p.other,false],['Net Profit',p.net,true]].map(([k,v,bold])=>`

  </div>`;
};

SCREENS['settings'] = function(){
  const pr = brand().profile;
  const sel = (label,icon,opts,val) => `<div><label class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-1"><i data-lucide="${icon}" class="text-indigo-500" style="width:14px;height:14px"></i>${label}</label>
    <select class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/40">${opts.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select></div>`;
  return `<div class="px-6 pt-6 pb-10 space-y-6 max-w-4xl">
    ${pageHeader('Configuration','Set up your business profile to power better AI-driven insights.','')}

      <div id="rebuild-result" class="mt-3"></div>`,'wrench','bg-gray-100 text-gray-600')}
  </div>`;

function rebuildAgg(btn){
  btn.innerHTML = '<i data-lucide="loader-2" class="animate-spin" style="width:16px;height:16px"></i> Rebuilding…'; icons();

}
function pickerCard(){
  return `<div class="wrapped-card relative w-full aspect-[9/16] max-h-[80vh] rounded-[28px] shadow-2xl ring-1 ring-white/10 bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-600 text-white flex flex-col items-center justify-center text-center px-7 py-9">
    <div class="w-14 h-14 bg-white/15 rounded-full flex items-center justify-center mb-4"><i data-lucide="sparkles" style="width:28px;height:28px"></i></div>
    <h1 class="text-3xl font-black mb-1 leading-tight">Finalytics<br>Wrapped</h1>
    <p class="text-white/70 text-sm mb-6">Select a period to see your recap</p>
    <div class="grid grid-cols-3 gap-2 w-full mb-5">${DATA.years.map(y=>`<button onclick="state.year=${y};openWrapped()" class="py-2.5 rounded-xl font-bold text-sm ${y===state.year?'bg-white text-indigo-700':'bg-white/10 hover:bg-white/20'}">${y}</button>`).join('')}</div>
    <button onclick="startWrapped()" class="w-full bg-gradient-to-r from-green-400 to-emerald-500 hover:from-green-500 hover:to-emerald-600 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2"><i data-lucide="play" style="width:18px;height:18px"></i> Start ${state.year} Wrapped</button>
  </div>`;
}
function openWrapped(){
  document.getElementById('wrapped-root').innerHTML = wrappedShell(pickerCard(), '');
  icons();
}
function startWrapped(){
  wrappedIdx = 0;
  document.getElementById('wrapped-root').innerHTML = wrappedShell('', `
    <button id="wnav-prev" onclick="wrappedNav(-1)" class="wnav left-3 sm:left-10"><i data-lucide="chevron-left" style="width:24px;height:24px"></i></button>
    <button id="wnav-next" onclick="wrappedNav(1)" class="wnav right-3 sm:right-10"><i data-lucide="chevron-right" style="width:24px;height:24px"></i></button>`);
  renderWrappedSlide();
}
function renderWrappedSlide(){
  const slides = wrappedSlides();
  const stage = document.getElementById('wrapped-stage');
  if(stage) stage.innerHTML = wrappedCard(slides[wrappedIdx]);
  const dots = document.getElementById('wrapped-dots');
  if(dots) dots.innerHTML = slides.map((_,i)=>`<div class="h-1 rounded-full transition-all ${i===wrappedIdx?'w-7 bg-white':'w-3.5 bg-white/30'}"></div>`).join('');
  const prev=document.getElementById('wnav-prev'), next=document.getElementById('wnav-next');
  if(prev) prev.style.visibility = wrappedIdx>0 ? 'visible':'hidden';
  if(next) next.style.visibility = wrappedIdx<slides.length-1 ? 'visible':'hidden';
  icons();
}
function wrappedNav(dir){ wrappedIdx=Math.max(0,Math.min(wrappedSlides().length-1, wrappedIdx+dir)); renderWrappedSlide(); }
function closeWrapped(){ document.getElementById('wrapped-root').innerHTML=''; if(!location.hash || location.hash==='#/wrapped') location.hash='#/dashboard'; }
</script>

<script>
// boot
window.addEventListener('DOMContentLoaded', ()=>{ icons(); });
</script>
</body>
</html>
