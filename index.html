function curve(base, points, jitter, peakIdx){
  // deterministic pseudo-data generator (no Math.random — stable across reloads)
  const out=[];
  for(let i=0;i<points;i++){
    const wave = Math.sin((i/points)*Math.PI*2)*0.18 + Math.sin((i/3))*0.06;
    const peak = peakIdx!=null ? Math.exp(-Math.pow(i-peakIdx,2)/ (points*0.6)) * 0.5 : 0;
    out.push(Math.round(base*(1+wave+peak) + (i%5)*jitter));
  }
  return out;
}

function pnlDerived(p){
  const gross = p.revenue - p.cogs;
  const operating = gross - p.opex;
  const net = operating - p.other;
  return {
    ...p, gross, operating, net,
    grossMargin: gross/p.revenue*100,
    opMargin: operating/p.revenue*100,
    netMargin: net/p.revenue*100,
  };
}

/* growth vs a mock "previous period" (derived deterministically) */
function growth(seed){ const g = ((seed%17)-6); return g; }

/* ============================================================================

   ========================================================================== */
function showToast(msg, type='success'){
  const root = document.getElementById('toast-root');
  const colors = type==='success' ? 'border-emerald-200' : type==='info' ? 'border-indigo-200':'border-amber-200';
  const icon = type==='success' ? 'check-circle-2' : type==='info' ? 'info' : 'alert-triangle';
  const iconColor = type==='success' ? 'text-emerald-500' : type==='info' ? 'text-indigo-500' : 'text-amber-500';
  const t = document.createElement('div');
  t.className = `animate-slide-up bg-white rounded-xl shadow-xl border ${colors} px-4 py-3 flex items-center gap-3 max-w-sm`;
  t.innerHTML = `<i data-lucide="${icon}" class="${iconColor}" style="width:20px;height:20px"></i><span class="text-sm text-gray-700 font-medium">${msg}</span>`;
  root.appendChild(t); icons();
  setTimeout(()=>{ t.style.transition='opacity .4s, transform .4s'; t.style.opacity='0'; t.style.transform='translateY(10px)'; setTimeout(()=>t.remove(),400); }, 3200);
}

/* ============================================================================
   ROUTER
   ========================================================================== */
const SCREENS = {}; // id -> render fn, registered below
function route(){
  let id = (location.hash||'#/dashboard').replace('#/','');
  if(id==='wrapped'){ openWrapped(); history.replaceState(null,'', '#/'+ (window._lastScreen||'dashboard')); renderNav(); return; }
  window._lastScreen = id;
  const fn = SCREENS[id] || SCREENS['dashboard'];
  const el = document.getElementById('screen-content');
  el.innerHTML = `<div class="fade-in-content">${fn()}</div>`;
  icons();
  // Defer chart rendering until the CSS grid has placed cards in their columns,
  // otherwise ApexCharts measures full-row width and overflows into the next card.
  if(CHART_INIT[id]) requestAnimationFrame(()=>requestAnimationFrame(()=>{
    if(((location.hash||'#/dashboard').replace('#/','')) === id) CHART_INIT[id]();
  }));
  renderNav();
  syncBrandBranchLabels();
  document.querySelector('main').scrollTo(0,0);
}
window.addEventListener('hashchange', route);

// Re-render the current screen's charts on resize so widths stay correct.
let _resizeT;
window.addEventListener('resize', ()=>{
  clearTimeout(_resizeT);
  _resizeT = setTimeout(()=>{
    const id = (location.hash||'#/dashboard').replace('#/','');
    if(CHART_INIT[id] && !document.getElementById('app-zoom').classList.contains('hidden')) CHART_INIT[id]();
  }, 200);
});

const CHART_INIT = {};
</script>

      </div>
      <div class="flex items-center justify-between gap-3 mt-5 pt-4 border-t border-gray-100">
        <button onclick="showToast('Connection test passed ✓','success')" class="text-sm text-indigo-600 hover:text-indigo-700 font-medium">Test connection</button>
        <button onclick="saveIntegration('${key}','${name}')" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-4 py-2 rounded-lg text-sm">Save & connect</button>
      </div>
    </div>`);
  icons();
}
function saveIntegration(key, name){
  state.integrations[key]=true; closeModal(); showToast(name+' connected — first sync started','success');
  if(location.hash.includes('integrations')) route();
}

/* ============================================================================
   FINALYTICS WRAPPED  (full-screen slideshow)
   ========================================================================== */
let wrappedIdx = 0;
function wrappedSlides(){
  const d = ds(); const p = pnlDerived(d.pnl);
  const slide = (bg, content) => ({bg, content});
  return [
    slide('from-indigo-600 via-purple-600 to-pink-600', `<div class="text-center"><i data-lucide="sparkles" class="mx-auto mb-4" style="width:44px;height:44px"></i><h1 class="text-4xl font-black mb-2 leading-tight">${state.year}<br>Wrapped</h1><p class="text-base text-white/80 font-semibold">${brand().name}</p><p class="text-sm text-white/60">${branch().name}</p><p class="mt-6 text-sm text-white/60">Let's relive your year →</p></div>`),
    slide('from-emerald-500 to-teal-600', `<div class="text-center"><p class="text-base text-white/70 mb-2">You earned</p><h1 class="text-4xl font-black mb-3">${fmtCompact(d.revenue)}</h1><p class="text-sm text-white/80">in total revenue this year 🎉</p></div>`),
    slide('from-blue-500 to-indigo-600', `<div class="text-center"><p class="text-base text-white/70 mb-2">That's</p><h1 class="text-4xl font-black mb-3">${fmtNum(d.transactions)}</h1><p class="text-sm text-white/80">orders served — ${fmtIDR(d.avgTicket)} each on average</p></div>`),
    slide('from-orange-500 to-red-600', `<div class="text-center"><p class="text-base text-white/70 mb-2">Your best day was</p><h1 class="text-3xl font-black mb-3">${d.bestDay.date}</h1><p class="text-sm text-white/80">with ${fmtIDR(d.bestDay.amount)} in sales 🔥</p></div>`),
    slide('from-purple-600 to-fuchsia-600', `<div class="text-center"><p class="text-base text-white/70 mb-3">Your busiest hour</p><h1 class="text-3xl font-black mb-5">6–8 PM</h1><div class="flex items-end justify-center gap-1 h-24">${d.hourly.map(v=>`<div class="w-1.5 bg-white/80 rounded-t" style="height:${Math.max(v/Math.max(...d.hourly)*100,4)}%"></div>`).join('')}</div></div>`),
    slide('from-teal-500 to-cyan-600', `<div class="text-center"><p class="text-base text-white/70 mb-4">Your weekly rhythm</p><div class="flex items-end justify-center gap-2 h-28">${d.weekly.map((v,i)=>`<div class="flex flex-col items-center gap-1.5"><div class="w-6 bg-white/80 rounded-t" style="height:${v/Math.max(...d.weekly)*88}px"></div><span class="text-[10px] text-white/60">${DAYS[i]}</span></div>`).join('')}</div><p class="mt-5 text-sm text-white/80">Saturday is your power day 💪</p></div>`),
    slide('from-amber-500 to-orange-600', `<div class="w-full"><p class="text-base text-white/70 mb-4 text-center">Your top products</p>${d.topProducts.slice(0,5).map((pp,i)=>`<div class="flex items-center gap-2.5 mb-1.5 text-left bg-white/10 rounded-lg px-2.5 py-2"><span class="text-lg font-black w-5 text-center">${i+1}</span><span class="flex-1 font-semibold text-sm truncate">${pp.name}</span></div>`).join('')}</div>`),
    slide('from-pink-600 to-rose-600', `<div class="text-center"><p class="text-base text-white/70 mb-2">Your #1 category</p><h1 class="text-4xl font-black mb-3">${d.categories[0].name}</h1><p class="text-sm text-white/80">${fmtIDR(d.categories[0].rev)} in revenue ☕</p></div>`),
    slide('from-green-500 to-emerald-600', `<div class="text-center"><p class="text-base text-white/70 mb-2">And you kept</p><h1 class="text-5xl font-black mb-3">${p.netMargin.toFixed(0)}%</h1><p class="text-sm text-white/80">net profit margin — ${fmtIDR(p.net)} take-home 💰</p></div>`),
    slide('from-indigo-600 via-purple-600 to-pink-600', `<div class="text-center"><i data-lucide="party-popper" class="mx-auto mb-4" style="width:44px;height:44px"></i><h1 class="text-3xl font-black mb-2 leading-tight">That's a wrap,<br>${state.year}!</h1><p class="text-sm text-white/80 mb-6">Here's to an even bigger ${state.year+1}.</p><div class="flex flex-col gap-2"><button onclick="showToast('Wrapped image saved','success')" class="bg-white text-indigo-700 font-semibold px-4 py-2.5 rounded-lg text-sm">Download image</button><button onclick="closeWrapped()" class="bg-white/15 hover:bg-white/25 font-semibold px-4 py-2.5 rounded-lg text-sm">Back to app</button></div></div>`),
  ];
}
// A single phone-style card on a static black gradient — only the card animates.
function wrappedCard(s){
  return `<div class="wrapped-card relative w-full aspect-[9/16] max-h-[80vh] rounded-[28px] shadow-2xl ring-1 ring-white/10 bg-gradient-to-br ${s.bg} text-white flex items-center justify-center px-6 py-9 overflow-hidden">
    <div class="absolute top-4 left-4 text-[10px] bg-white/15 px-2.5 py-1 rounded-full">${state.year} · ${branch().name}</div>
    <div class="w-full">${s.content}</div>
  </div>`;
}
function wrappedShell(stageInner, controls){
  return `<div class="fixed inset-0 z-50 flex items-center justify-center p-6 overflow-hidden"
    style="background: radial-gradient(120% 90% at 50% 18%, #1b1b22 0%, #0a0a0d 55%, #000 100%);">
    <button onclick="closeWrapped()" class="absolute top-5 right-5 z-20 p-2 text-white/60 hover:text-white hover:bg-white/10 rounded-lg"><i data-lucide="x" style="width:22px;height:22px"></i></button>
    <div id="wrapped-dots" class="absolute top-7 left-1/2 -translate-x-1/2 flex gap-1.5 z-20"></div>
    <div id="wrapped-stage" class="relative w-full max-w-[330px] mx-auto">${stageInner}</div>
    ${controls||''}
  </div>`;
}
function pickerCard(){
  return `<div class="wrapped-card relative w-full aspect-[9/16] max-h-[80vh] rounded-[28px] shadow-2xl ring-1 ring-white/10 bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-600 text-white flex flex-col items-center justify-center text-center px-7 py-9">
    <div class="w-14 h-14 bg-white/15 rounded-full flex items-center justify-center mb-4"><i data-lucide="sparkles" style="width:28px;height:28px"></i></div>
    <h1 class="text-3xl font-black mb-1 leading-tight">Finalytics<br>Wrapped</h1>
    <p class="text-white/70 text-sm mb-6">Select a period to see your recap</p>
    <div class="grid grid-cols-3 gap-2 w-full mb-5">${DATA.years.map(y=>`<button onclick="state.year=${y};openWrapped()" class="py-2.5 rounded-xl font-bold text-sm ${y===state.year?'bg-white text-indigo-700':'bg-white/10 hover:bg-white/20'}">${y}</button>`).join('')}</div>
    <button onclick="startWrapped()" class="w-full bg-gradient-to-r from-green-400 to-emerald-500 hover:from-green-500 hover:to-emerald-600 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2"><i data-lucide="play" style="width:18px;height:18px"></i> Start ${state.year} Wrapped</button>
  </div>`;
}
function openWrapped(){
  document.getElementById('wrapped-root').innerHTML = wrappedShell(pickerCard(), '');
  icons();
}
function startWrapped(){
  wrappedIdx = 0;
  document.getElementById('wrapped-root').innerHTML = wrappedShell('', `
    <button id="wnav-prev" onclick="wrappedNav(-1)" class="wnav left-3 sm:left-10"><i data-lucide="chevron-left" style="width:24px;height:24px"></i></button>
    <button id="wnav-next" onclick="wrappedNav(1)" class="wnav right-3 sm:right-10"><i data-lucide="chevron-right" style="width:24px;height:24px"></i></button>`);
  renderWrappedSlide();
}
function renderWrappedSlide(){
  const slides = wrappedSlides();
  const stage = document.getElementById('wrapped-stage');
  if(stage) stage.innerHTML = wrappedCard(slides[wrappedIdx]);
  const dots = document.getElementById('wrapped-dots');
  if(dots) dots.innerHTML = slides.map((_,i)=>`<div class="h-1 rounded-full transition-all ${i===wrappedIdx?'w-7 bg-white':'w-3.5 bg-white/30'}"></div>`).join('');
  const prev=document.getElementById('wnav-prev'), next=document.getElementById('wnav-next');
  if(prev) prev.style.visibility = wrappedIdx>0 ? 'visible':'hidden';
  if(next) next.style.visibility = wrappedIdx<slides.length-1 ? 'visible':'hidden';
  icons();
}
function wrappedNav(dir){ wrappedIdx=Math.max(0,Math.min(wrappedSlides().length-1, wrappedIdx+dir)); renderWrappedSlide(); }
function closeWrapped(){ document.getElementById('wrapped-root').innerHTML=''; if(!location.hash || location.hash==='#/wrapped') location.hash='#/dashboard'; }
</script>

<script>
// boot
window.addEventListener('DOMContentLoaded', ()=>{ icons(); });
</script>
</body>
